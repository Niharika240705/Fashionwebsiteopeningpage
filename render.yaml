services:
  - type: web
    name: fashioninsta-api
    runtime: node
    rootDir: server
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: processed-images
      - key: AUTO_INGEST_DEMO
        value: "false"
      - key: ENABLE_SCHEDULED_SCRAPING
        value: "false"
      - key: ENABLE_MYNTRA_SCRAPE
        value: "false"
      - key: ENABLE_HM_SCRAPE
        value: "false"
      - key: ENABLE_ZARA_SCRAPE
        value: "false"
      - key: ENABLE_DEMO_FEED
        value: "true"
      - key: CRON_INGEST_SOURCE
        value: "demo-affiliate"
      - key: CRON_ADMIN_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false

  - type: cron
    name: fashioninsta-catalog-sync
    runtime: node
    rootDir: server
    schedule: "0 */8 * * *"
    buildCommand: npm ci && npm run build
    startCommand: node -e "const http=require('http');const host=process.env.BACKEND_URL;if(!host){console.error('BACKEND_URL required');process.exit(1);}const source=process.env.CRON_INGEST_SOURCE||'demo-affiliate';const url=new URL('/api/admin/ingestion/ingest/'+source,host);const data=JSON.stringify({limit:100,processImages:false});const req=http.request(url,{method:'POST',headers:{'Content-Type':'application/json','Content-Length':Buffer.byteLength(data),'x-cron-token':process.env.CRON_ADMIN_TOKEN||''}},res=>{res.on('data',()=>{});res.on('end',()=>{if(res.statusCode&&res.statusCode>=400)process.exit(1);});});req.on('error',err=>{console.error(err);process.exit(1);});req.write(data);req.end();"
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: CRON_INGEST_SOURCE
        value: "demo-affiliate"
      - key: CRON_ADMIN_TOKEN
        sync: false
